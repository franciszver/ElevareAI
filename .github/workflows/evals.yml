name: Evals

on:
  workflow_dispatch:

jobs:
  regression-gate:
    name: Offline Regression Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Grade fixtures and gate on regression vs baseline
        run: |
          python -m evals.run_eval

  # Optional, non-gating: score the same fixtures with a live OpenRouter
  # judge (google/gemma-4-31b-it:free) for a qualitative read. Advisory
  # only — this job never fails the workflow, and only runs if the
  # OPENROUTER_API_KEY secret is configured. See evals/judge.py and
  # evals/README.md for details.
  live-judge-advisory:
    name: Live Judge (advisory, optional)
    runs-on: ubuntu-latest
    needs: regression-gate
    if: ${{ always() && secrets.OPENROUTER_API_KEY != '' }}
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live judge
        run: |
          echo "Live judge step is a placeholder — wire up evals.judge.openrouter_judge here if/when needed."
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
