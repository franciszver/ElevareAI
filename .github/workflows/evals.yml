name: Evals

on:
  workflow_dispatch:

jobs:
  regression-gate:
    name: Offline Regression Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Grade fixtures and gate on regression vs baseline
        run: |
          python -m evals.run_eval

  # Future: Live judge (advisory, optional). If adding a job that references
  # secrets.OPENROUTER_API_KEY, do NOT use a job-level if condition on
  # secrets — GitHub Actions forbids that. Instead, pass the secret via
  # env: and gate with a step-level if on the env var. Example:
  #   env:
  #     HAS_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  #   if: env.HAS_KEY != ''
